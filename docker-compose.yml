services:
  emby-episode-organizer:
    image: akaishuichiw/emby-episode-organizer:latest
    container_name: emby-episode-organizer
    ports:
      - "8899:8899"
    volumes:
      - ./config:/config
      - ./logs:/logs
      - /path/to/downloads:/downloads
      - /path/to/staging:/staging
      - /path/to/media/tv:/media/tv
      - /path/to/media/anime:/media/anime
    environment:
      - TZ=Asia/Shanghai
    env_file:
      - ./.env
      - ./config/.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8899/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
